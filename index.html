<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>ARIA live demo</title>
  <style>
    body {
      background: #0f1115;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 20px;
    }

    .buttons button {
      padding: 10px 20px;
      margin: 0 5px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    .start { background: #2dd4bf; }
    .stop { background: #fda4af; }

    .grid {
      display: flex;
      gap: 20px;
    }

    .box {
      border: 1px solid #555;
      padding: 20px;
      width: 120px;
      text-align: center;
    }

    .label {
      opacity: 0.7;
      margin-bottom: 10px;
    }

    .value {
      font-size: 20px;
      color: #fda4af;
    }
  </style>
</head>
<body>

<div class="buttons">
  <button class="start" onclick="start()">Оживить</button>
  <button class="stop" onclick="stop()">Остановить</button>
</div>

<div class="grid">
  <div class="box" aria-live="polite">
    <div class="label">число (polite)</div>
    <div id="polite" class="value">0</div>
  </div>

  <div class="box" aria-live="assertive">
    <div class="label">буква (assertive)</div>
    <div id="assertive" class="value">A</div>
  </div>

  <div class="box" aria-live="off">
    <div class="label">слово (off)</div>
    <div id="off" class="value">привет</div>
  </div>
</div>

<script>
  let interval;

  const words = ["привет", "мир", "код", "дока", "aria", "сайт"];

  function randomLetter() {
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    return alphabet[Math.floor(Math.random() * alphabet.length)];
  }

  function randomWord() {
    return words[Math.floor(Math.random() * words.length)];
  }

  function start() {
    if (interval) return;

    interval = setInterval(() => {
      const number = Math.floor(Math.random() * 100);

      document.getElementById("polite").textContent = number;
      document.getElementById("assertive").textContent = randomLetter();
      document.getElementById("off").textContent = randomWord();
    }, 2000);
  }

  function stop() {
    clearInterval(interval);
    interval = null;
  }
</script>

</body>
</html>
